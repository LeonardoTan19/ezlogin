name: build-multi-platform

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-cli-ubuntu:
    name: cli-ubuntu-amd64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/cli/target
            src-tauri/core/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-cli-${{ runner.os }}-

      - name: Build Ubuntu CLI packages
        shell: bash
        run: |
          chmod +x scripts/package-cli-ubuntu.sh
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/package-cli-ubuntu.sh "$VERSION"

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ezlogin-cli-ubuntu-amd64
          path: |
            dist-cli/*.deb
          if-no-files-found: error

  build-desktop:
    name: desktop-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri desktop bundle
        run: pnpm tauri build

      - name: Show desktop artifacts
        shell: bash
        run: |
          echo "Artifacts under src-tauri/target/release:"
          find src-tauri/target/release -maxdepth 4 -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.msi" \) \
            | sort || true

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/*.exe
          if-no-files-found: error

  build-android:
    name: android-aarch64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target/aarch64-linux-android/release
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Prepare Android signing keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret." >&2
            exit 1
          fi

          KEYSTORE_DIR="$RUNNER_TEMP/android-signing"
          KEYSTORE_PATH="$KEYSTORE_DIR/release.jks"
          mkdir -p "$KEYSTORE_DIR"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "TAURI_ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Configure Android toolchain for Rust/OpenSSL
        shell: bash
        run: |
          set -euo pipefail

          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/27.0.12077973"
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> "$GITHUB_ENV"
          echo "PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android APK (aarch64)
        env:
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm tauri android build --apk --target aarch64

      - name: Rename Android APK with version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          APK_SOURCE="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | grep '/release/' | head -n 1 || true)"
          if [ -z "$APK_SOURCE" ]; then
            APK_SOURCE="$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | head -n 1 || true)"
          fi

          if [ -z "$APK_SOURCE" ]; then
            echo "No APK found after build." >&2
            exit 1
          fi

          mkdir -p dist-android
          APK_TARGET="dist-android/ezlogin-android-v${VERSION}-aarch64.apk"
          cp "$APK_SOURCE" "$APK_TARGET"
          echo "Prepared APK: $APK_TARGET"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-aarch64
          path: |
            dist-android/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error

  publish-release:
    name: publish-github-release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-cli-ubuntu
      - build-desktop
      - build-android
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release files
        shell: bash
        run: |
          echo "Files to publish:"
          find release-artifacts -type f | sort

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.apk
            release-artifacts/**/*.aab
